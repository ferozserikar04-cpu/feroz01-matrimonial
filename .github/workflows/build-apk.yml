name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Build Web App
        run: |
          if [ -f "package.json" ]; then
            npm run build --if-present
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: |
          if [ -d "android" ] && { [ -f "capacitor.config.json" ] || [ -f "capacitor.config.ts" ]; }; then
            npx cap sync
          fi

      - name: Configure and Print Signing Fingerprints (SHA-1 & SHA-256)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Generating standard debug keystore..."
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "================================================================"
          echo "       ANDROID APP SIGNING FINGERPRINTS FOR FIREBASE CONSOLE    "
          echo "================================================================"
          echo "Add these fingerprints to your Firebase Project Settings under"
          echo "your Android application (package: com.feroz01.matrimonial) to"
          echo "enable Phone Authentication, App Check, and Google Sign-In:"
          echo ""
          echo "--- MD5 / SHA-1 / SHA-256 Fingerprints ---"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android | grep -E "MD5|SHA1|SHA256" || true
          echo "================================================================"

      - name: Build Android APK
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -d "android" ] && [ -f "android/gradlew" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Error: No gradle project found at root or in 'android' folder."
            exit 1
          fi

      - name: Prepare APK for Release
        run: |
          # Find the built APK and copy it to a standardized, premium filename
          APK_PATH=$(find android/app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find built APK."
            exit 1
          fi
          echo "Found APK at $APK_PATH"
          mkdir -p build-release
          cp "$APK_PATH" build-release/Feroz_01_Matrimonial.apk
          echo "Copied to build-release/Feroz_01_Matrimonial.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build-release/Feroz_01_Matrimonial.apk

      - name: Create GitHub Release
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }} (Latest APK)
          body: |
            ## Feroz 01 Matrimonial Android Build

            This release is automatically generated by GitHub Actions. It contains the latest signed Android APK build of Feroz 01 Matrimonial.

            ### Installation Instructions
            1. Download the **`Feroz_01_Matrimonial.apk`** file from the Assets below.
            2. Transfer it to your Android device (or download directly on your phone).
            3. Tap the file to install it. (If prompted, allow installation from "Unknown Sources" or your browser).
            4. Launch and enjoy the premium matchmaking experience!
          draft: false
          prerelease: false
          files: build-release/Feroz_01_Matrimonial.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

